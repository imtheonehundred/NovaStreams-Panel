<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MPD to HLS Restream Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <link href="/css/style.css" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              dark: { 50:'#f8fafc',100:'#f1f5f9',200:'#e2e8f0',300:'#cbd5e1',400:'#94a3b8',500:'#64748b',600:'#475569',700:'#334155',800:'#1e293b',900:'#0f172a',950:'#020617' },
              accent: { 50:'#eff6ff',100:'#dbeafe',200:'#bfdbfe',300:'#93c5fd',400:'#60a5fa',500:'#3b82f6',600:'#2563eb',700:'#1d4ed8' },
              success: '#10b981',
              danger: '#ef4444',
              warning: '#f59e0b',
            }
          }
        }
      }
    </script>
</head>
<body class="bg-dark-950 text-white min-h-screen">
    <!-- Top Navbar -->
    <nav class="bg-dark-900 border-b border-dark-700 px-6 py-3 flex items-center justify-between sticky top-0 z-50">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-gradient-to-br from-accent-500 to-accent-700 rounded-lg flex items-center justify-center">
                <i class="fas fa-satellite-dish text-white text-lg"></i>
            </div>
            <div>
                <h1 class="text-lg font-bold text-white">Restream Panel</h1>
                <p class="text-xs text-dark-400">MPD &rarr; HLS Converter</p>
            </div>
        </div>
        <div class="flex items-center gap-4">
            <div id="statsBar" class="flex gap-4 text-sm">
                <span class="text-dark-400"><i class="fas fa-tv ml-1"></i> القنوات: <span id="totalChannels" class="text-white">0</span></span>
                <span class="text-dark-400"><i class="fas fa-play-circle ml-1 text-success"></i> نشطة: <span id="activeChannels" class="text-success">0</span></span>
            </div>
            <button onclick="openAddModal()" class="bg-accent-600 hover:bg-accent-700 text-white px-4 py-2 rounded-lg text-sm font-medium transition-all flex items-center gap-2">
                <i class="fas fa-plus"></i> اضافة قناة
            </button>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="p-6">
        <!-- Empty State -->
        <div id="emptyState" class="hidden flex flex-col items-center justify-center py-20">
            <div class="w-24 h-24 bg-dark-800 rounded-full flex items-center justify-center mb-6">
                <i class="fas fa-satellite-dish text-4xl text-dark-500"></i>
            </div>
            <h2 class="text-xl font-semibold text-dark-300 mb-2">لا توجد قنوات</h2>
            <p class="text-dark-500 mb-6">اضف اول قناة لبدء البث</p>
            <button onclick="openAddModal()" class="bg-accent-600 hover:bg-accent-700 text-white px-6 py-3 rounded-lg font-medium transition-all">
                <i class="fas fa-plus ml-2"></i> اضافة قناة جديدة
            </button>
        </div>

        <!-- Channels Grid -->
        <div id="channelsGrid" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4">
        </div>
    </div>

    <!-- Add/Edit Channel Modal -->
    <div id="channelModal" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 hidden flex items-center justify-center p-4">
        <div class="bg-dark-900 rounded-2xl w-full max-w-2xl max-h-[90vh] overflow-y-auto border border-dark-700 shadow-2xl">
            <div class="p-6 border-b border-dark-700 flex items-center justify-between">
                <h2 id="modalTitle" class="text-xl font-bold">
                    <i class="fas fa-plus-circle text-accent-500 ml-2"></i>
                    اضافة قناة جديدة
                </h2>
                <button onclick="closeModal()" class="text-dark-400 hover:text-white text-xl"><i class="fas fa-times"></i></button>
            </div>
            <form id="channelForm" class="p-6 space-y-5" onsubmit="saveChannel(event)">
                <input type="hidden" id="editId" value="">
                
                <!-- Channel Name -->
                <div>
                    <label class="block text-sm font-medium text-dark-300 mb-2">
                        <i class="fas fa-tag ml-1"></i> اسم القناة
                    </label>
                    <input type="text" id="channelName" required placeholder="مثال: MBC 2" 
                        class="w-full bg-dark-800 border border-dark-600 rounded-lg px-4 py-3 text-white placeholder-dark-500 focus:border-accent-500 focus:ring-1 focus:ring-accent-500 outline-none">
                </div>

                <!-- Type -->
                <div>
                    <label class="block text-sm font-medium text-dark-300 mb-2">
                        <i class="fas fa-shield-alt ml-1"></i> نوع التشفير
                    </label>
                    <select id="channelType" class="w-full bg-dark-800 border border-dark-600 rounded-lg px-4 py-3 text-white focus:border-accent-500 outline-none">
                        <option value="WIDEVINE">Widevine</option>
                        <option value="CLEARKEY">ClearKey</option>
                        <option value="PLAYREADY">PlayReady</option>
                    </select>
                </div>

                <!-- MPD URL -->
                <div>
                    <label class="block text-sm font-medium text-dark-300 mb-2">
                        <i class="fas fa-link ml-1"></i> رابط MPD
                    </label>
                    <textarea id="mpdUrl" required rows="2" placeholder="https://example.com/live/channel/index.mpd"
                        class="w-full bg-dark-800 border border-dark-600 rounded-lg px-4 py-3 text-white placeholder-dark-500 focus:border-accent-500 focus:ring-1 focus:ring-accent-500 outline-none font-mono text-sm resize-none"></textarea>
                </div>

                <!-- PSSH -->
                <div>
                    <label class="block text-sm font-medium text-dark-300 mb-2">
                        <i class="fas fa-key ml-1"></i> PSSH Data <span class="text-dark-500 text-xs">(اختياري)</span>
                    </label>
                    <textarea id="psshData" rows="2" placeholder="AAAATXBzc2gA..."
                        class="w-full bg-dark-800 border border-dark-600 rounded-lg px-4 py-3 text-white placeholder-dark-500 focus:border-accent-500 focus:ring-1 focus:ring-accent-500 outline-none font-mono text-sm resize-none"></textarea>
                </div>

                <!-- KID & Key -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-dark-300 mb-2">
                            <i class="fas fa-fingerprint ml-1"></i> KID
                        </label>
                        <input type="text" id="channelKid" required placeholder="e3ce77324a3d4fa2..."
                            class="w-full bg-dark-800 border border-dark-600 rounded-lg px-4 py-3 text-white placeholder-dark-500 focus:border-accent-500 focus:ring-1 focus:ring-accent-500 outline-none font-mono text-sm">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-dark-300 mb-2">
                            <i class="fas fa-lock ml-1"></i> Key
                        </label>
                        <input type="text" id="channelKey" required placeholder="17774f82a3b9e33e..."
                            class="w-full bg-dark-800 border border-dark-600 rounded-lg px-4 py-3 text-white placeholder-dark-500 focus:border-accent-500 focus:ring-1 focus:ring-accent-500 outline-none font-mono text-sm">
                    </div>
                </div>

                <!-- Custom Headers -->
                <div>
                    <label class="block text-sm font-medium text-dark-300 mb-2">
                        <i class="fas fa-code ml-1"></i> Custom Headers <span class="text-dark-500 text-xs">(JSON)</span>
                    </label>
                    <textarea id="customHeaders" rows="5" placeholder='{
  "Origin": "https://example.com",
  "Referer": "https://example.com/",
  "User-Agent": "Mozilla/5.0..."
}'
                        class="w-full bg-dark-800 border border-dark-600 rounded-lg px-4 py-3 text-white placeholder-dark-500 focus:border-accent-500 focus:ring-1 focus:ring-accent-500 outline-none font-mono text-sm resize-none"></textarea>
                </div>

                <!-- Buttons -->
                <div class="flex gap-3 pt-2">
                    <button type="submit" class="flex-1 bg-accent-600 hover:bg-accent-700 text-white py-3 rounded-lg font-medium transition-all flex items-center justify-center gap-2">
                        <i class="fas fa-save"></i> <span id="saveBtn">حفظ القناة</span>
                    </button>
                    <button type="button" onclick="closeModal()" class="px-6 bg-dark-700 hover:bg-dark-600 text-white py-3 rounded-lg font-medium transition-all">
                        الغاء
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Player Modal -->
    <div id="playerModal" class="fixed inset-0 bg-black/80 backdrop-blur-sm z-50 hidden flex items-center justify-center p-4">
        <div class="bg-dark-900 rounded-2xl w-full max-w-4xl border border-dark-700 shadow-2xl">
            <div class="p-4 border-b border-dark-700 flex items-center justify-between">
                <h2 id="playerTitle" class="text-lg font-bold"><i class="fas fa-play-circle text-accent-500 ml-2"></i> المشغل</h2>
                <button onclick="closePlayer()" class="text-dark-400 hover:text-white text-xl"><i class="fas fa-times"></i></button>
            </div>
            <div class="p-4">
                <video id="hlsPlayer" controls class="w-full rounded-lg bg-black" style="max-height: 70vh;"></video>
                <div id="playerHlsUrl" class="mt-3 p-3 bg-dark-800 rounded-lg flex items-center justify-between">
                    <code class="text-sm text-accent-400 font-mono truncate" id="playerUrlText"></code>
                    <button onclick="copyHlsUrl()" class="text-dark-400 hover:text-white mr-3"><i class="fas fa-copy"></i></button>
                </div>
            </div>
        </div>
    </div>

    <!-- Logs Modal -->
    <div id="logsModal" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 hidden flex items-center justify-center p-4">
        <div class="bg-dark-900 rounded-2xl w-full max-w-3xl max-h-[80vh] border border-dark-700 shadow-2xl flex flex-col">
            <div class="p-4 border-b border-dark-700 flex items-center justify-between">
                <h2 id="logsTitle" class="text-lg font-bold"><i class="fas fa-terminal text-accent-500 ml-2"></i> السجلات</h2>
                <button onclick="closeLogsModal()" class="text-dark-400 hover:text-white text-xl"><i class="fas fa-times"></i></button>
            </div>
            <pre id="logsContent" class="p-4 text-xs font-mono text-dark-300 overflow-auto flex-1 whitespace-pre-wrap" dir="ltr"></pre>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="fixed bottom-6 left-6 z-50 hidden">
        <div class="bg-dark-800 border border-dark-600 rounded-lg px-5 py-3 shadow-xl flex items-center gap-3">
            <i id="toastIcon" class="fas fa-check-circle text-success"></i>
            <span id="toastMsg" class="text-sm"></span>
        </div>
    </div>

    <script src="/js/app.js"></script>
</body>
</html>
