# IPTV Panel — Nginx front (same host as Node)
# Copy to e.g. /etc/nginx/sites-available/iptv and symlink to sites-enabled.
# /hls/ aliases to IPTV_DISK_ROOT/hls/; /live/ proxies to Node (MPEG-TS live stream). See STREAMING-AUTH.md.
# Adjust server_name, ssl_certificate, paths, and upstream port.

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
  worker_connections 4096;
  multi_accept on;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;
  server_tokens off;

  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;
  keepalive_timeout 65;
  types_hash_max_size 4096;

  # HLS / TS (do not gzip video)
  gzip off;

  upstream iptv_node {
    server 127.0.0.1:3000;
    keepalive 32;
  }

  server {
    listen 80;
    server_name _;

    # Optional: TLS in production
    # listen 443 ssl http2;
    # ssl_certificate     /path/to/fullchain.pem;
    # ssl_certificate_key /path/to/privkey.pem;

    # API + panel (Node)
    location /api/ {
      proxy_pass http://iptv_node;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_buffering off;
      proxy_read_timeout 3600s;
    }

    location / {
      proxy_pass http://iptv_node;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # HLS segments + playlists on disk when STREAMING_MODE=nginx and IPTV_DISK_ROOT=/var/lib/iptv
    location /hls/ {
      alias /var/lib/iptv/hls/;
      add_header Cache-Control "no-cache, no-store";
      types {
        application/vnd.apple.mpegurl m3u8;
        video/mp2t ts;
      }
      default_type application/octet-stream;
    }

    # MPEG-TS is a live chunked stream from Node (FFmpeg stdout); do not serve from disk.
    location /live/ {
      proxy_pass http://iptv_node;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_buffering off;
      proxy_request_buffering off;
      proxy_read_timeout 3600s;
      proxy_send_timeout 3600s;
      add_header Cache-Control "no-cache, no-store";
      default_type video/mp2t;
    }
  }
}
